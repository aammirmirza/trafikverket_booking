<!DOCTYPE html>
<html>
<head>
    <title>Trafikverket Slot Monitor</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #1a1a1a 0%, #2d2d2d 100%);
            min-height: 100vh;
            padding: 20px;
        }
        
        .container {
            max-width: 1800px;
            margin: 0 auto;
        }
        
        .header {
            background: #2a2a2a;
            border-radius: 15px;
            padding: 25px;
            margin-bottom: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            border: 1px solid #404040;
        }
        
        h1 {
            color: #e0e0e0;
            font-size: 2em;
            margin-bottom: 10px;
        }
        
        .status-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 15px;
            padding-top: 15px;
            border-top: 2px solid #404040;
            flex-wrap: wrap;
            gap: 10px;
            color: #b0b0b0;
        }
        
        .status-item {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 0.95em;
        }
        
        .status-item strong {
            color: #ffffff;
        }
        
        .status-icon {
            font-size: 1.2em;
        }
        
        .countdown {
            color: #888;
            font-size: 0.9em;
        }
        
        .monitors-grid {
            display: flex;
            flex-direction: column;
            gap: 20px;
            margin-top: 20px;
        }
        
        .city-monitor {
            background: #2a2a2a;
            border-radius: 15px;
            padding: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            border: 1px solid #404040;
            width: 100%;
        }
        
        .city-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
            padding-bottom: 15px;
            border-bottom: 3px solid #505050;
        }
        
        .city-name {
            font-size: 1.5em;
            font-weight: bold;
            color: #e0e0e0;
        }
        
        .city-count {
            background: #505050;
            color: #ffffff;
            padding: 5px 15px;
            border-radius: 20px;
            font-weight: bold;
        }
        
        .slots-container {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin-top: 15px;
        }
        
        .car-type-section {
            background: #1f1f1f;
            border-radius: 10px;
            padding: 15px;
            border: 2px solid #404040;
        }
        
        .car-type-header {
            font-size: 1.2em;
            font-weight: bold;
            margin-bottom: 10px;
            padding: 10px;
            border-radius: 8px;
            text-align: center;
        }
        
        .automatic-header {
            background: #2a3a4a;
            color: #88c0ff;
            border: 2px solid #506070;
        }
        
        .manual-header {
            background: #3a2a4a;
            color: #c088ff;
            border: 2px solid #605070;
        }
        
        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 10px;
        }
        
        th {
            background: linear-gradient(135deg, #404040 0%, #505050 100%);
            color: #ffffff;
            padding: 10px 8px;
            text-align: left;
            font-weight: 600;
            font-size: 0.85em;
            text-transform: uppercase;
        }
        
        th:first-child { border-radius: 8px 0 0 0; }
        th:last-child { border-radius: 0 8px 0 0; }
        
        td {
            padding: 10px 8px;
            border-bottom: 1px solid #3a3a3a;
            color: #c0c0c0;
            font-size: 0.9em;
        }
        
        tbody tr {
            background: #1f1f1f;
        }
        
        tr:hover {
            background-color: #353535 !important;
        }
        
        .slot-number {
            font-weight: bold;
            color: #ffffff;
        }
        
        .location-name {
            font-weight: bold;
            color: #ffd700;
            background: rgba(255, 215, 0, 0.15);
            padding: 4px 8px;
            border-radius: 8px;
            display: inline-block;
        }
        
        .priority-row {
            background-color: #3a2f00 !important;
            border-left: 4px solid #ff9800;
        }
        
        .priority-row:hover {
            background-color: #4d3d00 !important;
        }
        
        .status-soon {
            background: #ff9800;
            color: #1a1a1a;
            padding: 4px 12px;
            border-radius: 15px;
            font-weight: bold;
            font-size: 0.85em;
        }
        
        .hidden-row {
            display: none;
        }
        
        .no-slots {
            text-align: center;
            padding: 30px;
            color: #666;
            font-style: italic;
        }
        
        .show-more-btn {
            width: 100%;
            padding: 12px;
            margin-top: 10px;
            background: linear-gradient(135deg, #404040 0%, #505050 100%);
            color: #ffffff;
            border: none;
            border-radius: 10px;
            font-size: 1em;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s;
        }
        
        .show-more-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(80, 80, 80, 0.5);
            background: linear-gradient(135deg, #505050 0%, #606060 100%);
        }
        
        .no-data {
            text-align: center;
            padding: 40px;
            color: #666;
            font-size: 1.1em;
        }
        
        .error-message {
            background: #3a1a1a;
            color: #ff8888;
            padding: 15px;
            border-radius: 10px;
            margin: 10px 0;
            border-left: 4px solid #ff6b6b;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🚗 Trafikverket Driving Test Slot Monitor</h1>
            <div class="status-bar">
                <div class="status-item">
                    <span class="status-icon">🕐</span>
                    <span>Last Updated: <strong id="lastUpdate">Loading...</strong></span>
                </div>
                <div class="status-item">
                    <span class="status-icon">📊</span>
                    <span>Total Slots: <strong id="totalSlots">0</strong></span>
                </div>
                <div class="status-item">
                    <span class="status-icon">⚡</span>
                    <span>Priority Slots: <strong id="prioritySlots">0</strong></span>
                </div>
                <div class="status-item">
                    <span class="status-icon">🔄</span>
                    <span>Auto-refresh: <strong>30s</strong> <span class="countdown" id="countdown">(30s)</span></span>
                </div>
            </div>
        </div>
        
        <div id="errorContainer"></div>
        <div id="monitorsGrid" class="monitors-grid"></div>
    </div>

    <script>
        const INITIAL_ROWS = 5; // Show top 5 rows initially
        const REFRESH_INTERVAL = 30000; // 30 seconds
        let countdown = 30;
        let countdownTimer = null;
        
        function startCountdown() {
            countdown = 30;
            const countdownElement = document.getElementById('countdown');
            
            if (countdownTimer) {
                clearInterval(countdownTimer);
            }
            
            countdownTimer = setInterval(() => {
                countdown--;
                if (countdown <= 0) {
                    countdown = 30;
                }
                countdownElement.textContent = `(${countdown}s)`;
            }, 1000);
        }
        
        function toggleMoreRows(cityId, carType) {
            const table = document.getElementById(`table-${cityId}-${carType}`);
            const hiddenRows = table.querySelectorAll(`.hidden-row-${cityId}-${carType}`);
            const btn = document.getElementById(`btn-${cityId}-${carType}`);
            
            const isHidden = hiddenRows[0].style.display === 'none' || hiddenRows[0].style.display === '';
            
            hiddenRows.forEach(row => {
                row.style.display = isHidden ? 'table-row' : 'none';
            });
            
            btn.textContent = isHidden ? '▲ Show Less' : `▼ Show More (${hiddenRows.length})`;
        }
        
        function updateDisplay(data) {
            const grid = document.getElementById('monitorsGrid');
            const errorContainer = document.getElementById('errorContainer');
            
            // Update header stats
            document.getElementById('lastUpdate').textContent = data.last_updated || 'Never';
            document.getElementById('totalSlots').textContent = data.total_slots || 0;
            
            // Use priority_count from backend if available, otherwise calculate
            const priorityCount = data.priority_count !== undefined ? data.priority_count : 0;
            document.getElementById('prioritySlots').textContent = priorityCount;
            
            // Handle errors
            if (data.error) {
                errorContainer.innerHTML = `<div class="error-message">⚠️ ${data.error}</div>`;
                grid.innerHTML = '<div class="no-data">No slot data available</div>';
                return;
            } else {
                errorContainer.innerHTML = '';
            }
            
            // Check if we have data
            if (!data.slots_data || Object.keys(data.slots_data).length === 0) {
                grid.innerHTML = '<div class="no-data">📭 No slots found. Waiting for data...</div>';
                return;
            }
            
            // Build monitors for each city
            let html = '';
            for (const [city, carTypes] of Object.entries(data.slots_data)) {
                const cityId = city.replace(/[^a-zA-Z0-9]/g, '_');
                const automaticSlots = carTypes.automatic || [];
                const manualSlots = carTypes.manual || [];
                const totalCitySlots = automaticSlots.length + manualSlots.length;
                
                html += `
                    <div class="city-monitor">
                        <div class="city-header">
                            <div class="city-name">📍 ${city}</div>
                            <div class="city-count">${totalCitySlots} slots (${automaticSlots.length}A + ${manualSlots.length}M)</div>
                        </div>
                        <div class="slots-container">
                `;
                
                // Automatic slots column
                html += buildCarTypeSection(cityId, 'automatic', automaticSlots, 'AUTOMATIC 🚗', 'automatic-header');
                
                // Manual slots column
                html += buildCarTypeSection(cityId, 'manual', manualSlots, 'MANUAL ⚙️', 'manual-header');
                
                html += `
                        </div>
                    </div>
                `;
            }
            
            grid.innerHTML = html;
        }
        
        function buildCarTypeSection(cityId, carType, slots, title, headerClass) {
            let html = `
                <div class="car-type-section">
                    <div class="car-type-header ${headerClass}">${title}</div>
            `;
            
            if (slots.length === 0) {
                html += '<div class="no-slots">No slots available</div>';
            } else {
                const hasMore = slots.length > INITIAL_ROWS;
                
                html += `
                    <table id="table-${cityId}-${carType}">
                        <thead>
                            <tr>
                                <th>#</th>
                                <th>Date</th>
                                <th>Time</th>
                                <th>Days</th>
                                <th>Status</th>
                            </tr>
                        </thead>
                        <tbody>
                `;
                
                slots.forEach((slot, index) => {
                    const isHidden = index >= INITIAL_ROWS;
                    const rowClass = slot.is_soon ? 'priority-row' : '';
                    const hiddenClass = isHidden ? `hidden-row hidden-row-${cityId}-${carType}` : '';
                    const displayStyle = isHidden ? 'display: none;' : '';
                    
                    html += `
                        <tr class="${rowClass} ${hiddenClass}" style="${displayStyle}">
                            <td class="slot-number">${slot.slot_number}</td>
                            <td>${slot.date}</td>
                            <td>${slot.time_range}</td>
                            <td>${slot.days_info}</td>
                            <td>${slot.is_soon ? '<span class="status-soon">⚡ SOON</span>' : ''}</td>
                        </tr>
                    `;
                });
                
                html += `
                        </tbody>
                    </table>
                `;
                
                if (hasMore) {
                    html += `
                        <button class="show-more-btn" id="btn-${cityId}-${carType}" onclick="toggleMoreRows('${cityId}', '${carType}')">
                            ▼ Show More (${slots.length - INITIAL_ROWS})
                        </button>
                    `;
                }
            }
            
            html += '</div>';
            return html;
        }
        
        function fetchData() {
            fetch('/api/slots')
                .then(response => response.json())
                .then(data => {
                    updateDisplay(data);
                    startCountdown();
                })
                .catch(error => {
                    console.error('Error fetching data:', error);
                    document.getElementById('errorContainer').innerHTML = 
                        '<div class="error-message">⚠️ Failed to fetch data from server</div>';
                });
        }
        
        // Initial load
        fetchData();
        
        // Refresh every 30 seconds
        setInterval(fetchData, REFRESH_INTERVAL);
    </script>
</body>
</html>
